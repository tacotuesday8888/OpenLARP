name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ios-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Set up Java for Firebase emulators
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21

      - name: Typecheck Genkit backend
        run: npm run typecheck:backend

      - name: Test Genkit backend
        run: npm run test:backend

      - name: Build Firebase Functions backend
        run: npm run build:backend

      - name: Test repository scripts
        run: npm run test:scripts

      - name: Test Firebase security rules
        run: npm run test:rules:emulators

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select available iPhone simulator
        id: simulator
        run: |
          DEVICE_ID="$(
            python3 - <<'PY'
          import re
          import subprocess
          import sys

          try:
              result = subprocess.run(
                  ["xcrun", "simctl", "list", "devices", "available"],
                  check=False,
                  capture_output=True,
                  text=True,
                  timeout=120,
              )
          except subprocess.TimeoutExpired:
              print("::warning::Timed out while listing iOS simulators; simulator tests will be skipped.", file=sys.stderr)
              sys.exit(0)

          if result.returncode != 0:
              print(result.stderr, file=sys.stderr)
              sys.exit(0)

          for line in result.stdout.splitlines():
              if "iPhone" in line and ("Shutdown" in line or "Booted" in line):
                  match = re.search(r"\(([0-9A-Fa-f-]{36})\)", line)
                  if match:
                      print(match.group(1))
                      break
          PY
          )"
          if [ -z "$DEVICE_ID" ]; then
            echo "has_simulator=false" >> "$GITHUB_OUTPUT"
            echo "No available iPhone simulator found; simulator tests will be skipped."
            exit 0
          fi
          echo "has_simulator=true" >> "$GITHUB_OUTPUT"
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $DEVICE_ID"

      - name: Build unsigned iOS app
        run: |
          xcodebuild \
            -project OpenLARP.xcodeproj \
            -scheme OpenLARP \
            -destination generic/platform=iOS \
            -derivedDataPath /tmp/OpenLARPDerivedDataBuild \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run simulator tests
        if: steps.simulator.outputs.has_simulator == 'true'
        timeout-minutes: 20
        run: |
          xcodebuild \
            -project OpenLARP.xcodeproj \
            -scheme OpenLARP \
            -destination "id=${{ steps.simulator.outputs.device_id }}" \
            -derivedDataPath /tmp/OpenLARPDerivedDataTests \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Report skipped simulator tests
        if: steps.simulator.outputs.has_simulator != 'true'
        run: |
          echo "::warning::No available iPhone simulator was discovered within 120 seconds. Backend checks, rules tests, and unsigned iOS build ran; run simulator XCTest locally before release."
