name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ios-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Check public repo safety
        run: npm run public:safety

      - name: Check beta release gate
        run: npm run beta:gate

      - name: Set up Java for Firebase emulators
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21

      - name: Typecheck Genkit backend
        run: npm run typecheck:backend

      - name: Test Genkit backend
        run: npm run test:backend

      - name: Build Firebase Functions backend
        run: npm run build:backend

      - name: Test repository scripts
        run: npm run test:scripts

      - name: Test Firebase security rules
        run: npm run test:rules:emulators

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select available iPhone simulator
        id: simulator
        run: |
          DEVICE_ID="$(
            python3 - <<'PY'
          import re
          import subprocess
          import sys

          try:
              result = subprocess.run(
                  ["xcrun", "simctl", "list", "devices", "available"],
                  check=False,
                  capture_output=True,
                  text=True,
                  timeout=120,
              )
          except subprocess.TimeoutExpired:
              print("::error::Timed out while listing iOS simulators.", file=sys.stderr)
              sys.exit(1)

          if result.returncode != 0:
              print(result.stderr, file=sys.stderr)
              sys.exit(result.returncode or 1)

          for line in result.stdout.splitlines():
              if "iPhone" in line and ("Shutdown" in line or "Booted" in line):
                  match = re.search(r"\(([0-9A-Fa-f-]{36})\)", line)
                  if match:
                      print(match.group(1))
                      break
          PY
          )"
          if [ -z "$DEVICE_ID" ]; then
            echo "::error::No available iPhone simulator found."
            exit 1
          fi
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $DEVICE_ID"

      - name: Build unsigned iOS app
        run: |
          xcodebuild \
            -project OpenLARP.xcodeproj \
            -scheme OpenLARP \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath /tmp/OpenLARPDerivedDataBuild \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run Debug simulator tests
        timeout-minutes: 20
        run: |
          set -euo pipefail

          DEBUG_RESULT_BUNDLE="${RUNNER_TEMP}/OpenLARPDebug-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.xcresult"
          xcodebuild \
            -project OpenLARP.xcodeproj \
            -scheme OpenLARP \
            -configuration Debug \
            -destination "id=${{ steps.simulator.outputs.device_id }}" \
            -derivedDataPath /tmp/OpenLARPDerivedDataTests \
            -resultBundlePath "$DEBUG_RESULT_BUNDLE" \
            test

          export DEBUG_SUMMARY_JSON="$(
            xcrun xcresulttool get test-results summary \
              --path "$DEBUG_RESULT_BUNDLE" \
              --compact
          )"
          python3 - <<'PY'
          import json
          import os
          import sys

          summary = json.loads(os.environ["DEBUG_SUMMARY_JSON"])
          total = summary.get("totalTestCount")
          passed = summary.get("passedTests")
          failed = summary.get("failedTests")
          skipped = summary.get("skippedTests")
          if (
              not isinstance(total, int)
              or total <= 0
              or passed != total
              or failed != 0
              or skipped != 0
          ):
              print(
                  f"::error::Debug test count mismatch: total={total}, "
                  f"passed={passed}, failed={failed}, skipped={skipped}",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

      - name: Run optimized App Store Release contract
        timeout-minutes: 20
        run: |
          set -euo pipefail

          ENABLE_TESTABILITY="$(
            xcodebuild \
              -project OpenLARP.xcodeproj \
              -target OpenLARP \
              -configuration Release \
              -showBuildSettings |
              awk -F ' = ' '/^[[:space:]]*ENABLE_TESTABILITY = / { print $2 }'
          )"
          if [ "$ENABLE_TESTABILITY" != "NO" ]; then
            echo "::error::Release ENABLE_TESTABILITY must be NO; resolved value was '$ENABLE_TESTABILITY'."
            exit 1
          fi

          RESULT_BUNDLE="${RUNNER_TEMP}/OpenLARPReleaseContract-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.xcresult"
          xcodebuild \
            -project OpenLARP.xcodeproj \
            -scheme OpenLARPReleaseContract \
            -configuration Release \
            -destination "id=${{ steps.simulator.outputs.device_id }}" \
            -derivedDataPath /tmp/OpenLARPReleaseContractTests \
            -resultBundlePath "$RESULT_BUNDLE" \
            -only-testing:OpenLARPReleaseContractTests/OpenLARPReleaseContractTests/testAppStoreReleaseContract \
            CODE_SIGNING_ALLOWED=NO \
            test

          export SUMMARY_JSON="$(
            xcrun xcresulttool get test-results summary \
              --path "$RESULT_BUNDLE" \
              --compact
          )"
          python3 - <<'PY'
          import json
          import os
          import sys

          summary = json.loads(os.environ["SUMMARY_JSON"])
          expected = {
              "totalTestCount": 1,
              "passedTests": 1,
              "failedTests": 0,
              "skippedTests": 0,
          }
          actual = {key: summary.get(key) for key in expected}
          if actual != expected:
              print(
                  f"::error::Release contract test count mismatch: {actual}",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY
